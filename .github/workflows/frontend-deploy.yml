name: Frontend Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: frontend-production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Validate Hostinger FTP secrets
        run: |
          test -n "${{ secrets.HOSTINGER_FTP_SERVER }}" || (echo "Missing HOSTINGER_FTP_SERVER" && exit 1)
          test -n "${{ secrets.HOSTINGER_FTP_USER }}" || (echo "Missing HOSTINGER_FTP_USER" && exit 1)
          test -n "${{ secrets.HOSTINGER_FTP_PASSWORD }}" || (echo "Missing HOSTINGER_FTP_PASSWORD" && exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Deploy frontend to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          state-name: .ftp-deploy-sync-state.json
