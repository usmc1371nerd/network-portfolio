name: Frontend Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: frontend-production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Validate Hostinger FTP secrets
        run: |
          test -n "${{ secrets.HOSTINGER_FTP_SERVER }}" || (echo "Missing HOSTINGER_FTP_SERVER" && exit 1)
          test -n "${{ secrets.HOSTINGER_FTP_USER }}" || (echo "Missing HOSTINGER_FTP_USER" && exit 1)
          test -n "${{ secrets.HOSTINGER_FTP_PASSWORD }}" || (echo "Missing HOSTINGER_FTP_PASSWORD" && exit 1)

      - name: Report API base configuration
        run: |
          if [ -n "${{ secrets.VITE_API_BASE_URL }}" ]; then
            echo "Using VITE_API_BASE_URL from GitHub Secrets"
          else
            echo "VITE_API_BASE_URL not set; using frontend default API base resolution"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Deploy frontend to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          state-name: .ftp-deploy-sync-state.json

  deploy-backend:
    runs-on: ubuntu-latest
    name: Deploy Backend to Hostinger
    needs: deploy-frontend
    continue-on-error: true

    steps:
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          envs: DB_HOST,DB_PORT,DB_USER,DB_PASSWORD,DB_NAME,JWT_SECRET,JWT_EXPIRES_IN,SETUP_SECRET
          script: |
            set -e
            cd ~/domains/api.jpsportfolio.com/nodejs

            git pull origin master

            if [ -n "$DB_HOST" ] && [ -n "$DB_USER" ] && [ -n "$DB_PASSWORD" ] && [ -n "$DB_NAME" ] && [ -n "$JWT_SECRET" ] && [ -n "$SETUP_SECRET" ]; then
              cat > server/.env <<EOF
PORT=4000
CLIENT_ORIGIN=https://jpsportfolio.com,https://www.jpsportfolio.com
DB_HOST=$DB_HOST
DB_PORT=${DB_PORT:-3306}
DB_USER=$DB_USER
DB_PASSWORD=$DB_PASSWORD
DB_NAME=$DB_NAME
JWT_SECRET=$JWT_SECRET
JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-8h}
SETUP_ENABLED=false
SETUP_SECRET=$SETUP_SECRET
EOF
              echo "server/.env written from GitHub Secrets"
            else
              echo "DB/JWT secrets not set; keeping existing server/.env"
            fi

            npm install --omit=dev
            node server/scripts/checkDb.js

            mkdir -p tmp
            touch tmp/restart.txt
            echo "Backend deployed and restarted"
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
      SETUP_SECRET: ${{ secrets.SETUP_SECRET }}
